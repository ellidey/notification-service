services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notification-service-app
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html:cached
      - vendor-data:/var/www/html/vendor
      - storage-framework-cache:/var/www/html/storage/framework/cache
      - storage-framework-sessions:/var/www/html/storage/framework/sessions
      - storage-framework-views:/var/www/html/storage/framework/views
      - storage-api-docs:/var/www/html/storage/api-docs
      - storage-logs:/var/www/html/storage/logs
      - bootstrap-cache:/var/www/html/bootstrap/cache
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: notification-service-nginx
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  postgres:
    image: postgres:17-alpine
    container_name: notification-service-postgres
    environment:
      POSTGRES_DB: notification_service
      POSTGRES_USER: notification_service
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification_service -d notification_service"]
      interval: 5s
      timeout: 5s
      retries: 20

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notification-service-queue
    working_dir: /var/www/html
    command: php artisan queue:work --queue=notifications,default --tries=3 --backoff=10
    volumes:
      - .:/var/www/html:cached
      - vendor-data:/var/www/html/vendor
      - storage-framework-cache:/var/www/html/storage/framework/cache
      - storage-framework-sessions:/var/www/html/storage/framework/sessions
      - storage-framework-views:/var/www/html/storage/framework/views
      - storage-api-docs:/var/www/html/storage/api-docs
      - storage-logs:/var/www/html/storage/logs
      - bootstrap-cache:/var/www/html/bootstrap/cache
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  vendor-data:
  storage-framework-cache:
  storage-framework-sessions:
  storage-framework-views:
  storage-api-docs:
  storage-logs:
  bootstrap-cache:
